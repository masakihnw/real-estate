# ruff 設定 — 段階導入のため、まずは実害のあるエラー検出に限定する。
# （未定義名・構文エラー・明白なバグ）。スタイル系ルールは将来拡張する。
target-version = "py311"
line-length = 120

extend-exclude = [
    ".venv",
    "old",
    "data",
    "results",
]

[lint]
# E9: 構文エラー / F63: 比較バグ / F7: 文法ミス / F82: 未定義名
# F401 (未使用import) と F841 (未使用変数) は既存コードの整理後に有効化する
select = ["E9", "F63", "F7", "F82"]
