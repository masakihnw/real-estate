<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>マンション購入支援アプリ — 3画面詳細仕様</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="list-screen.jsx"></script>
<script type="text/babel" src="detail-screen.jsx"></script>
<script type="text/babel" src="dashboard-screen.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Frame({ label, sub, children, screenLabel }) {
  return (
    <div className="frame-item" data-screen-label={screenLabel}>
      <IOSDevice width={390} height={820}>
        <div className="device-inner">
          <div className="body">{children}</div>
        </div>
      </IOSDevice>
      <div className="label"><b>{label}</b>{sub}</div>
    </div>
  );
}

function App() {
  const [detail, setDetail] = useState(null);
  const [listTab, setListTab] = useState('chuko');

  return (
    <div className="stage">
      <div className="stage-title">マンション購入支援アプリ — 詳細仕様 3画面</div>

      <div className="frame-row">
        <Frame screenLabel="03 Dashboard" label="画面3" sub="ダッシュボード">
          <DashboardScreen onOpenListing={setDetail} />
          <BottomBar active="dash" onChange={() => {}} />
        </Frame>

        <Frame screenLabel="01 Listing list" label="画面1" sub="物件一覧 — 中古/新築/お気に入り">
          {detail
            ? <DetailScreen l={detail} onBack={() => setDetail(null)} />
            : <ListScreen kind={listTab} onOpenListing={setDetail} />}
          <BottomBar active={detail ? 'chuko' : listTab} onChange={(k) => { setDetail(null); setListTab(k === 'fav' || k === 'chuko' || k === 'shin' ? k : listTab); }} />
        </Frame>

        <Frame screenLabel="02 Detail" label="画面2" sub="物件詳細（タップで遷移）">
          <DetailScreen l={SPEC_LISTINGS[0]} onBack={() => {}} />
          <BottomBar active="chuko" onChange={() => {}} />
        </Frame>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
