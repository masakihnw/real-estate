<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Real Estate iOS — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: #1c1c1e; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 12px; }
  .frame-wrap { display: flex; gap: 36px; flex-wrap: wrap; justify-content: center; }
  .label { color: #fff; font: var(--t-caption); text-align: center; margin-top: 12px; opacity: .7; }
  .device-inner { display: flex; flex-direction: column; height: 100%; padding-top: 54px; padding-bottom: 34px; }
  .device-inner > .body { flex: 1; min-height: 0; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [tab, setTab] = useState('chuko');
  const [detail, setDetail] = useState(null);

  const screen = (k) => {
    if (detail) return <DetailScreen l={detail} onBack={() => setDetail(null)} />;
    if (k === 'dash') return <DashboardScreen />;
    if (k === 'chuko') return <ListScreen kind="chuko" onOpen={setDetail} />;
    if (k === 'shin') return <ListScreen kind="shin" onOpen={setDetail} />;
    if (k === 'fav') return <ListScreen kind="fav" onOpen={setDetail} />;
    return <DashboardScreen />;
  };

  return (
    <div className="frame-wrap">
      <div data-screen-label="01 Dashboard">
        <IOSDevice width={390} height={820}>
          <div className="device-inner">
            <div className="body"><DashboardScreen /></div>
            <TabBar active="dash" onChange={() => {}} />
          </div>
        </IOSDevice>
        <div className="label">01 · ダッシュボード</div>
      </div>
      <div data-screen-label="02 List + Detail">
        <IOSDevice width={390} height={820}>
          <div className="device-inner">
            <div className="body">{screen(tab)}</div>
            <TabBar active={detail ? 'chuko' : tab} onChange={(k) => { setDetail(null); setTab(k); }} />
          </div>
        </IOSDevice>
        <div className="label">02 · 一覧 → 詳細（タップで遷移）</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
