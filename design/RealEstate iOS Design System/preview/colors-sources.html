<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Source / portal colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;font:var(--t-footnote);color:var(--fg-primary)}
  .row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--separator)}
  .row:last-child{border:0}
  .dot{width:14px;height:14px;border-radius:4px;flex:0 0 14px}
  .name{font:600 14px/1 var(--font-system);min-width:90px}
  .badge{padding:3px 8px;border-radius:6px;font:var(--t-badge);color:#fff}
  .hex{font:var(--t-caption2);color:var(--fg-secondary);margin-left:auto;font-feature-settings:"tnum"}
</style></head>
<body>
<div class="row"><span class="dot" style="background:var(--src-suumo)"></span><span class="name">SUUMO</span><span class="badge" style="background:var(--src-suumo)">SUUMO</span><span class="hex">#00973B</span></div>
<div class="row"><span class="dot" style="background:var(--src-homes)"></span><span class="name">HOME'S</span><span class="badge" style="background:var(--src-homes)">HOME'S</span><span class="hex">#F29600</span></div>
<div class="row"><span class="dot" style="background:var(--src-rehouse)"></span><span class="name">リハウス</span><span class="badge" style="background:var(--src-rehouse)">リハウス</span><span class="hex">#C8102E</span></div>
<div class="row"><span class="dot" style="background:var(--src-nomucom)"></span><span class="name">ノムコム</span><span class="badge" style="background:var(--src-nomucom)">ノムコム</span><span class="hex">#003F88</span></div>
<div class="row"><span class="dot" style="background:var(--src-athome)"></span><span class="name">アットホーム</span><span class="badge" style="background:var(--src-athome)">アットホーム</span><span class="hex">#E60012</span></div>
<div class="row"><span class="dot" style="background:var(--src-stepon)"></span><span class="name">住友不動産</span><span class="badge" style="background:var(--src-stepon)">住友不動産</span><span class="hex">#1F4E9D</span></div>
<div class="row"><span class="dot" style="background:var(--src-livable)"></span><span class="name">東急リバブル</span><span class="badge" style="background:var(--src-livable)">東急リバブル</span><span class="hex">#009A44</span></div>
</body></html>
