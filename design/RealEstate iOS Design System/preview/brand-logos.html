<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logos & brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;color:var(--fg-primary);font:var(--t-footnote)}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .row img{height:48px;width:48px;object-fit:contain;border-radius:10px;background:var(--bg-card)}
  .row .small img{height:28px;width:28px}
  h4{margin:0 0 6px;font:var(--t-caption);color:var(--fg-secondary);text-transform:uppercase;letter-spacing:.04em}
  .lbl{font:var(--t-caption);color:var(--fg-secondary)}
</style></head>
<body>
<h4>App icon</h4>
<div class="row">
  <img src="../assets/AppIcon.png" alt="AppIcon" style="border-radius:14px">
  <img src="../assets/AppIcon-Login.png" alt="Login" style="border-radius:14px">
  <span class="lbl">AppIcon · AppIcon-Login</span>
</div>

<h4>AI provider logos (Consultation)</h4>
<div class="row small">
  <img src="../assets/logo-claude.png" alt="Claude">
  <img src="../assets/logo-chatgpt.png" alt="ChatGPT">
  <img src="../assets/logo-gemini.png" alt="Gemini">
  <span class="lbl">claude · chatgpt · gemini</span>
</div>

<h4>Commute destination logos</h4>
<div class="row small">
  <img src="../assets/logo-playground.png" alt="Playground">
  <img src="../assets/logo-m3career.png" alt="M3Career">
  <span class="lbl">commute-pg · commute-m3</span>
</div>
</body></html>
