<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;color:var(--fg-primary)}
  .row{display:grid;grid-template-columns:120px 1fr 70px;gap:14px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--separator)}
  .name{font:var(--t-caption);color:var(--fg-secondary);font-feature-settings:"tnum"}
  .px{font:var(--t-caption2);color:var(--fg-tertiary);text-align:right;font-feature-settings:"tnum"}
  .row:last-child{border:0}
</style></head>
<body>
<div class="row"><span class="name">largeTitle</span><span style="font:var(--t-largeTitle)">ダッシュボード</span><span class="px">34/700</span></div>
<div class="row"><span class="name">title1</span><span style="font:var(--t-title1)">中古マンション</span><span class="px">28/700</span></div>
<div class="row"><span class="name">title2</span><span style="font:var(--t-title2)">マーケット概況</span><span class="px">22/700</span></div>
<div class="row"><span class="name">title3</span><span style="font:var(--t-title3)">投資サマリー</span><span class="px">20/600</span></div>
<div class="row"><span class="name">headline</span><span style="font:var(--t-headline)">AQUA VISTA アクアヴィスタ</span><span class="px">17/600</span></div>
<div class="row"><span class="name">body</span><span style="font:var(--t-body)">3LDK 92.2㎡ 築11年 7階/16階建</span><span class="px">17/400</span></div>
<div class="row"><span class="name">callout</span><span style="font:var(--t-callout)">京成本線「千住大橋」徒歩3分</span><span class="px">16/400</span></div>
<div class="row"><span class="name">subheadline</span><span style="font:var(--t-subheadline)">管理費1.3万 修繕1.2万 計2.5万/月</span><span class="px">15/400</span></div>
<div class="row"><span class="name">footnote</span><span style="font:var(--t-footnote)">他サイト: 9,150万 (-50万)</span><span class="px">13/400</span></div>
<div class="row"><span class="name">caption</span><span style="font:var(--t-caption)">確信度: 87%</span><span class="px">12/400</span></div>
<div class="row"><span class="name">caption2</span><span style="font:var(--t-caption2)">更新: 11:17</span><span class="px">11/400</span></div>
</body></html>
