<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><title>Hazard badges & disclosed feature chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:14px;background:var(--bg-secondary);color:var(--fg-primary);font-feature-settings:"tnum"}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}

  h4{margin:0 0 6px;font:600 10px/1 var(--font-system);color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.06em}

  /* Hazard — severity-coded, compact */
  .haz-row{display:flex;gap:6px;flex-wrap:wrap}
  .haz{padding:2px 7px;border-radius:5px;font:600 11px/1.4 var(--font-system);display:inline-flex;align-items:center;gap:3px}
  .h-high{background:rgba(255,59,48,.14);color:#a02114}
  .h-mid{background:rgba(255,149,0,.16);color:#a35e00}
  .h-low{background:rgba(255,204,0,.22);color:#7a5e00}
  .h-none{background:rgba(52,199,89,.14);color:#1f7a3a}

  /* Disclosure: collapsed state (appears in listing card / detail page) */
  .disclose{
    background:var(--bg-card);border-radius:10px;padding:10px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    cursor:pointer;user-select:none;
  }
  .disclose .lbl{font:500 13px/1.3 var(--font-system);color:var(--fg-primary);display:flex;align-items:center;gap:6px}
  .disclose .ct{font:500 12px/1 var(--font-rounded);color:var(--fg-tertiary)}
  .disclose .chev{color:var(--fg-tertiary);font-size:14px;transition:transform .2s}
  .disclose.open .chev{transform:rotate(90deg)}

  /* Disclosure: expanded panel */
  .panel{
    background:var(--bg-card);border-radius:10px;padding:12px;
    display:flex;flex-direction:column;gap:10px;
  }
  .panel .head{display:flex;align-items:center;justify-content:space-between}
  .panel .head .lbl{font:500 13px/1.3 var(--font-system);display:flex;align-items:center;gap:6px}
  .panel .head .chev{color:var(--fg-tertiary);font-size:14px;transform:rotate(90deg)}
  .panel .group-h{font:600 10px/1 var(--font-system);color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .feat{padding:2px 7px;border-radius:4px;font:500 11px/1.5 var(--font-system);background:rgba(0,122,255,.10);color:var(--ios-blue)}
  .neg{padding:2px 7px;border-radius:4px;font:500 11px/1.5 var(--font-system);background:rgba(255,149,0,.12);color:#a35e00}
  .renov{padding:2px 7px;border-radius:4px;font:500 11px/1.5 var(--font-system);background:rgba(88,86,214,.10);color:var(--ai-accent)}
  .group + .group{border-top:1px solid var(--separator);padding-top:10px}

  .ai-ind{display:inline-flex;align-items:center;gap:3px;padding:1px 5px 1px 4px;border-radius:3px;background:rgba(88,86,214,.10);color:var(--ai-accent);font:600 9px/1.4 var(--font-system);letter-spacing:.04em}
  .ai-ind::before{content:"✦";font-size:8px}

  .col-label{font:500 10px/1 var(--font-system);color:var(--fg-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
</style></head>
<body>

<h4 style="margin-bottom:8px">Hazard badges — listing card に常時表示</h4>
<div class="haz-row" style="margin-bottom:14px">
  <span class="haz h-high">⚠ 洪水 高</span>
  <span class="haz h-mid">⚠ 地震 中</span>
  <span class="haz h-low">⚠ 土砂 低</span>
  <span class="haz h-none">✓ 災害なし</span>
</div>

<div class="grid">

  <!-- Default (collapsed) — listing card / 詳細ページ初期状態 -->
  <div>
    <div class="col-label">Default · 折り畳み</div>
    <div class="disclose">
      <div class="lbl">
        <span style="color:var(--ios-blue)">📋</span>
        抽出特徴
        <span class="ai-ind">AI</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="ct">14項目</span>
        <span class="chev">›</span>
      </div>
    </div>
  </div>

  <!-- Tapped (expanded) — equipment + negatives revealed -->
  <div>
    <div class="col-label">Tapped · 展開後</div>
    <div class="panel">
      <div class="head">
        <div class="lbl">
          <span style="color:var(--ios-blue)">📋</span>
          抽出特徴
          <span class="ai-ind">AI</span>
        </div>
        <span class="chev">›</span>
      </div>

      <div class="group">
        <div class="group-h">設備・仕様</div>
        <div class="chips">
          <span class="feat">食洗機</span>
          <span class="feat">床暖房</span>
          <span class="feat">ディスポーザー</span>
          <span class="feat">浴室乾燥</span>
          <span class="feat">宅配BOX</span>
          <span class="feat">免震</span>
        </div>
      </div>

      <div class="group">
        <div class="group-h">リノベ履歴</div>
        <div class="chips">
          <span class="renov">2022 水回り全交換</span>
          <span class="renov">2020 内装フルリノベ</span>
        </div>
      </div>

      <div class="group">
        <div class="group-h">注意点</div>
        <div class="chips">
          <span class="neg">バルコニー狭い</span>
          <span class="neg">EVなし</span>
          <span class="neg">機械式駐車場</span>
        </div>
      </div>
    </div>
  </div>

</div>

</body></html>
