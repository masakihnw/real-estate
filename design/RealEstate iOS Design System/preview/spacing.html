<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;color:var(--fg-primary);font:var(--t-footnote)}
  .row{display:grid;grid-template-columns:80px 1fr 80px;align-items:center;gap:12px;padding:6px 0}
  .bar{height:14px;background:var(--ios-blue);border-radius:3px}
  .name{font:600 12px/1 var(--font-system)}
  .px{color:var(--fg-secondary);text-align:right;font-feature-settings:"tnum"}
</style></head>
<body>
<div class="row"><span class="name">space-4</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
<div class="row"><span class="name">space-8</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
<div class="row"><span class="name">space-12</span><div class="bar" style="width:12px"></div><span class="px">12 px · row vert</span></div>
<div class="row"><span class="name">space-16</span><div class="bar" style="width:16px"></div><span class="px">16 px · row horiz, grid</span></div>
<div class="row"><span class="name">space-20</span><div class="bar" style="width:20px"></div><span class="px">20 px · section</span></div>
<div class="row"><span class="name">space-24</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
</body></html>
