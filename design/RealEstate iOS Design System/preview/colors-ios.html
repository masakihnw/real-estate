<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>iOS HIG semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;font:var(--t-footnote);color:var(--fg-primary)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .sw{display:flex;flex-direction:column;gap:4px}
  .chip{height:42px;border-radius:8px;border:1px solid rgba(0,0,0,.06)}
  .name{font:600 11px/1.2 var(--font-system)}
  .hex{font:var(--t-caption2);color:var(--fg-secondary);font-feature-settings:"tnum"}
  h4{margin:0 0 8px;font:var(--t-caption);color:var(--fg-secondary);text-transform:uppercase;letter-spacing:.04em}
</style></head>
<body>
<h4>iOS HIG palette</h4>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--ios-blue)"></div><div class="name">blue</div><div class="hex">#007AFF</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-green)"></div><div class="name">green</div><div class="hex">#34C759</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-red)"></div><div class="name">red</div><div class="hex">#FF3B30</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-orange)"></div><div class="name">orange</div><div class="hex">#FF9500</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-yellow)"></div><div class="name">yellow</div><div class="hex">#FFCC00</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-purple)"></div><div class="name">purple</div><div class="hex">#AF52DE</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-indigo)"></div><div class="name">indigo</div><div class="hex">#5856D6</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-teal)"></div><div class="name">teal</div><div class="hex">#30B0C7</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-pink)"></div><div class="name">pink</div><div class="hex">#FF2D55</div></div>
  <div class="sw"><div class="chip" style="background:var(--ios-gray)"></div><div class="name">gray</div><div class="hex">#8E8E93</div></div>
</div>
</body></html>
