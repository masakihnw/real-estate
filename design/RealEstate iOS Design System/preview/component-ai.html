<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>AI indicator & accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;color:var(--fg-primary);font:var(--t-footnote)}
  h4{margin:0 0 8px;font:var(--t-caption);color:var(--fg-secondary);text-transform:uppercase;letter-spacing:.04em}
  .ai{display:inline-flex;align-items:center;gap:3px;padding:2px 6px 2px 5px;border-radius:4px;background:rgba(88,86,214,.10);color:var(--ai-accent);font:var(--t-ai-indicator)}
  .ai svg{width:9px;height:9px}
  .panel{margin-top:14px;padding:12px;border:1px solid var(--ai-accent-border);background:rgba(88,86,214,.04);border-radius:10px}
  .panel header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .panel h5{margin:0;font:var(--t-headline);color:var(--ai-accent);display:flex;gap:6px;align-items:center}
  .panel p{margin:0;font:var(--t-subheadline);color:var(--fg-primary)}
</style></head>
<body>
<h4>AI indicator</h4>
<div style="display:flex;gap:10px;align-items:center">
  <span class="ai"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z"/></svg>AI</span>
  <span style="color:var(--fg-secondary);font:var(--t-caption)">caption2 · 9px · indigo · always next to AI-generated content</span>
</div>
<h4 style="margin-top:18px">AI Insights card</h4>
<div class="panel">
  <header>
    <h5><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2zM5 16l.7 2L8 18.7 5.7 19.4 5 22l-.7-2L2 19.4 4.3 18.7 5 16zM19 14l.7 2L22 16.7 19.7 17.4 19 20l-.7-2L16 17.4 18.3 16.7 19 14z"/></svg>AI Insights</h5>
    <span class="ai"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z"/></svg>AI</span>
  </header>
  <p>築浅×駅2分の好条件。管理状態も良好で長期保有向き。直近30日の売り出し増加率は低く、希少性が高い。</p>
</div>
</body></html>
