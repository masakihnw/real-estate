name: Sync Firestore scraping config

# ScrapingConfigMetadata.json の defaults を scraping_config/default に反映する。
# FIREBASE_SERVICE_ACCOUNT シークレット必須（enrich ワークフローと同じ）。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraping-tool/requirements.txt

      - name: Install dependencies
        working-directory: scraping-tool
        run: pip install -r requirements.txt

      - name: Push scraping_config/default from metadata JSON
        working-directory: scraping-tool
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python3 push_scraping_config_to_firestore.py
