name: Detect Delisted Listings

# Enrich & Report 完了後に起動し、SUUMO 詳細ページの掲載終了マーカーを検査する。
# 入力（対象 SUUMO URL 一覧）は Supabase listings_feed の active 物件から生成する。
# （results/latest.json は PII 除去で gitignore 化され repo に存在しないため、
#  チェックアウトだけでは入力を得られない。Supabase が現行の真ソース。）
# 検査結果は building_units.json の delisted フラグ等として更新・コミットする。
# 掲載終了の本番反映は、後続 scrape/enrich の merge_detail_cache が building_units.json を
# 適用して listings から除去 → supabase_sync が is_active を落とす経路で行われる。

on:
  workflow_run:
    workflows: ["Enrich and Report"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: detect-delisted
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # main はブランチ保護（ci-gate 必須・直push禁止）。github-actions[bot] は
          # 非管理者のため GITHUB_TOKEN では push が GH006 で拒否される。個人リポジトリ
          # では Ruleset の bot バイパスが使えない（org 限定）ため、管理者の PAT で push
          # する（enforce_admins:false＝管理者の直 push は必須チェックをバイパス可）。
          # 未設定時は GITHUB_TOKEN にフォールバック（checkout は通り push のみ失敗）。
          token: ${{ secrets.PAT_FINALIZE_PUSH || secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: Pull latest (enrich commit)
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraping-tool/requirements.txt

      - name: Install dependencies
        working-directory: scraping-tool
        run: pip install -r requirements.txt

      - name: Export active listings from Supabase
        working-directory: scraping-tool
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/export_supabase_snapshot.py \
            --output results/latest.json \
            --property-type chuko

      - name: Restore HTML cache
        uses: actions/cache@v5
        with:
          path: |
            scraping-tool/data/html_cache
          key: suumo-html-cache-${{ github.run_id }}
          restore-keys: |
            suumo-html-cache-

      - name: Run build_units_cache
        working-directory: scraping-tool
        run: python3 scripts/build_units_cache.py results/latest.json

      - name: Run merge_detail_cache
        id: merge
        working-directory: scraping-tool
        # latest.json から delisted 物件を除去し、除去件数を removed 出力に渡す
        # （commit メッセージ用の指標）。除去後 JSON は gitignore 対象のため commit
        # しない。Supabase の is_active 反映は後続 enrich の merge_detail_cache 経由。
        run: |
          BEFORE=$(python3 -c "import json; d=json.load(open('results/latest.json')); print(len([r for r in d if r.get('source')=='suumo']))")
          python3 scripts/merge_detail_cache.py results/latest.json
          AFTER=$(python3 -c "import json; d=json.load(open('results/latest.json')); print(len([r for r in d if r.get('source')=='suumo']))")
          REMOVED=$((BEFORE - AFTER))
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
          echo "掲載終了除去: ${REMOVED}件 (${BEFORE} → ${AFTER})" >&2

      - name: Save HTML cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            scraping-tool/data/html_cache
          # restore 側の restore-keys: suumo-html-cache- が前方一致で最新を拾うため、
          # run_id で一意化する。latest.json は Supabase の active 集合次第で毎回変わる
          # ephemeral ファイルのため、その hashFiles をキーにしない。
          key: suumo-html-cache-${{ github.run_id }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # latest.json は gitignore 対象（PII 除去で repo 管理外）かつ Supabase から
          # 毎回生成する一時ファイルのため commit しない。永続化するのは
          # building_units.json（delisted フラグ等の SUUMO 詳細キャッシュ）のみ。
          git add scraping-tool/data/building_units.json

          if git diff --cached --quiet; then
            echo "変更なし"
            exit 0
          fi

          REMOVED="${{ steps.merge.outputs.removed }}"
          git commit -m "fix: 掲載終了${REMOVED}件を検出・building_units.json を更新

          detect-delisted workflow
          building_units.json の delisted フラグ等を更新
          （本番除去は後続 enrich の merge_detail_cache 経由）"

          git pull --rebase --autostash origin main
          git push origin HEAD:refs/heads/main
