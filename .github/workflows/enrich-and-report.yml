name: Enrich and Report

# WF2: 加工+レポートワークフロー
# WF1 (Scrape Listings) 完了時に自動起動。
# 中古 enrichment を core/mansion/claude に分割し、
# 新築/成約実績と合わせて並列実行。finalize でマージ・レポート生成・コミット。
# sumai enrichment は enrich-sumai.yml に分離（レートリミット対策）。
# cancel-in-progress: false — 実行中のジョブは完了まで走り切り、
# 次の実行はキューで待機（GitHub Actions はキューに1件のみ保持）。

on:
  workflow_run:
    workflows: ["Scrape Listings"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: '使用する Scrape Listings の run ID (空欄で最新)'
        required: false
        type: string
      force:
        description: 'has_changes を無視して強制実行'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: enrich-and-report
  cancel-in-progress: false

jobs:
  # ──────────────────────────── Job 0: check ────────────────────────────
  check:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 5
    outputs:
      has_changes: ${{ steps.read.outputs.has_changes }}
      is_slack_time: ${{ steps.read.outputs.is_slack_time }}
      date: ${{ steps.read.outputs.date }}
      run_id: ${{ steps.resolve.outputs.run_id }}

    steps:
      - name: Resolve run ID
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.workflow_run.id }}" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          else
            # 手動実行で run_id 未指定: 最新の成功した Scrape Listings run を使用
            LATEST=$(gh run list --workflow=scrape-listings.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId' --repo ${{ github.repository }})
            if [ -n "$LATEST" ]; then
              echo "run_id=$LATEST" >> $GITHUB_OUTPUT
              echo "最新の Scrape Listings run ID: $LATEST"
            else
              echo "::error::run ID が特定できません（成功した Scrape Listings run がありません）"
              exit 1
            fi
          fi

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: scrape-metadata
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read metadata
        id: read
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ -f metadata.json ]; then
            HAS_CHANGES=$(python3 -c "import json; print(str(json.load(open('metadata.json'))['has_changes']).lower())")
            IS_SLACK_TIME=$(python3 -c "import json; print(str(json.load(open('metadata.json'))['is_slack_time']).lower())")
            DATE=$(python3 -c "import json; print(json.load(open('metadata.json'))['date'])")
            if [ "$FORCE" = "true" ]; then
              HAS_CHANGES=true
              echo "強制実行: has_changes を true に上書き" >&2
            fi
            echo "has_changes=${HAS_CHANGES}" >> $GITHUB_OUTPUT
            echo "is_slack_time=${IS_SLACK_TIME}" >> $GITHUB_OUTPUT
            echo "date=${DATE}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "is_slack_time=false" >> $GITHUB_OUTPUT
            echo "date=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────── Job 1a: enrich-chuko-core ────────────────────────────
  enrich-chuko-core:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-scraping
        with:
          install-playwright: 'true'

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          name: scrape-results
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/results/

      - name: Download cache files
        uses: actions/download-artifact@v4
        with:
          name: scrape-caches
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/data/
        continue-on-error: true

      - name: Restore commute gmaps cache
        uses: actions/cache/restore@v4
        with:
          path: scraping-tool/commute_gmaps_cache
          key: commute-gmaps-chuko-${{ github.run_id }}
          restore-keys: |
            commute-gmaps-chuko-
            commute-gmaps-

      - name: Prepare input
        working-directory: scraping-tool
        run: cp results/latest_raw.json results/latest.json

      - name: Run enrichment (core tracks)
        working-directory: scraping-tool
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          chmod +x scripts/run_enrich.sh
          ./scripts/run_enrich.sh --property-type chuko --tracks core

      - name: Save commute gmaps cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scraping-tool/commute_gmaps_cache
          key: commute-gmaps-chuko-${{ github.run_id }}

      - name: Upload enriched results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-chuko-core
          path: |
            scraping-tool/results/latest.json
            scraping-tool/data/geocode_cache.json
            scraping-tool/data/station_cache.json
            scraping-tool/data/reverse_geocode_cache.json
            scraping-tool/data/building_units.json
          retention-days: 1
          if-no-files-found: warn

  # enrich-chuko-sumai は独立ワークフロー (enrich-sumai.yml) に移動

  # ──────────────────────────── Job 1b: enrich-chuko-mansion ────────────────────────────
  enrich-chuko-mansion:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-scraping
        with:
          install-playwright: 'false'

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          name: scrape-results
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/results/

      - name: Download cache files
        uses: actions/download-artifact@v4
        with:
          name: scrape-caches
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/data/
        continue-on-error: true

      - name: Prepare input
        working-directory: scraping-tool
        run: cp results/latest_raw.json results/latest.json

      - name: Run enrichment (mansion track)
        working-directory: scraping-tool
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          chmod +x scripts/run_enrich.sh
          ./scripts/run_enrich.sh --property-type chuko --tracks mansion

      - name: Upload enriched results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-chuko-mansion
          path: |
            scraping-tool/results/latest.json
            scraping-tool/data/mansion_review_cache.json
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────── Job 1d: enrich-chuko-claude ────────────────────────────
  enrich-chuko-claude:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-scraping
        with:
          install-playwright: 'false'

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          name: scrape-results
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/results/

      - name: Download cache files
        uses: actions/download-artifact@v4
        with:
          name: scrape-caches
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/data/
        continue-on-error: true

      - name: Restore Claude response cache
        uses: actions/cache/restore@v4
        with:
          path: scraping-tool/data/claude_cache.db
          key: claude-cache-chuko-${{ github.run_id }}
          restore-keys: |
            claude-cache-chuko-

      - name: Prepare input
        working-directory: scraping-tool
        run: cp results/latest_raw.json results/latest.json

      - name: Run enrichment (claude tracks)
        working-directory: scraping-tool
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            chmod +x scripts/run_enrich.sh
            ./scripts/run_enrich.sh --property-type chuko --tracks claude
          else
            echo "ANTHROPIC_API_KEY 未設定: スキップ"
          fi

      - name: Save Claude response cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scraping-tool/data/claude_cache.db
          key: claude-cache-chuko-${{ github.run_id }}

      - name: Upload enriched results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-chuko-claude
          path: |
            scraping-tool/results/latest.json
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────── Job 2: enrich-shinchiku ────────────────────────────
  enrich-shinchiku:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-scraping
        with:
          install-playwright: 'true'

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          name: scrape-results
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/results/

      - name: Download cache files
        uses: actions/download-artifact@v4
        with:
          name: scrape-caches
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/data/
        continue-on-error: true

      - name: Restore commute gmaps cache
        uses: actions/cache/restore@v4
        with:
          path: scraping-tool/commute_gmaps_cache
          key: commute-gmaps-shinchiku-${{ github.run_id }}
          restore-keys: |
            commute-gmaps-shinchiku-
            commute-gmaps-

      - name: Restore Claude response cache (shinchiku)
        uses: actions/cache/restore@v4
        with:
          path: scraping-tool/data/claude_cache.db
          key: claude-cache-shinchiku-${{ github.run_id }}
          restore-keys: |
            claude-cache-shinchiku-

      - name: Prepare input
        working-directory: scraping-tool
        run: |
          if [ -f results/latest_shinchiku_raw.json ]; then
            cp results/latest_shinchiku_raw.json results/latest_shinchiku.json
          else
            echo "新築データなし: スキップ"
            exit 0
          fi

      - name: Run enrichment (sumai は独立ワークフローで実行)
        working-directory: scraping-tool
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -f results/latest_shinchiku.json ]; then
            chmod +x scripts/run_enrich.sh
            ./scripts/run_enrich.sh --property-type shinchiku --exclude-tracks sumai
          fi

      - name: Save commute gmaps cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scraping-tool/commute_gmaps_cache
          key: commute-gmaps-shinchiku-${{ github.run_id }}

      - name: Save Claude response cache (shinchiku)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scraping-tool/data/claude_cache.db
          key: claude-cache-shinchiku-${{ github.run_id }}

      - name: Upload enriched results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-shinchiku
          path: |
            scraping-tool/results/latest_shinchiku.json
            scraping-tool/data/geocode_cache.json
            scraping-tool/data/floor_plan_storage_manifest.json
            scraping-tool/data/station_cache.json
            scraping-tool/data/reverse_geocode_cache.json
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────── Job 3: build-transaction-feed ────────────────────────────
  build-transaction-feed:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-scraping
        with:
          install-playwright: 'false'

      - name: Download cache files
        uses: actions/download-artifact@v4
        with:
          name: scrape-caches
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/data/
        continue-on-error: true

      - name: Download scrape results for name reference
        uses: actions/download-artifact@v4
        with:
          name: scrape-results
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/results/
        continue-on-error: true

      - name: Prepare references
        working-directory: scraping-tool
        run: |
          # build_transaction_feed が参照する latest/latest_shinchiku を配置
          [ -f results/latest_raw.json ] && cp results/latest_raw.json results/latest.json || true
          [ -f results/latest_shinchiku_raw.json ] && cp results/latest_shinchiku_raw.json results/latest_shinchiku.json || true

      - name: Build transaction feed
        working-directory: scraping-tool
        env:
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}
        run: |
          if [ -n "$REINFOLIB_API_KEY" ]; then
            python3 build_transaction_feed.py --quarters 20 --output results/transactions.json
          else
            echo "REINFOLIB_API_KEY 未設定のためスキップ"
          fi

      - name: Upload transaction feed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transactions
          path: scraping-tool/results/transactions.json
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────── Job 4: finalize ────────────────────────────
  finalize:
    needs: [check, enrich-chuko-core, enrich-chuko-mansion, enrich-chuko-claude, enrich-shinchiku, build-transaction-feed]
    if: "!cancelled() && (needs.check.outputs.has_changes == 'true' || needs.check.outputs.is_slack_time == 'true')"
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-scraping
        with:
          install-playwright: 'false'

      - name: Install extra dependencies
        working-directory: scraping-tool
        run: pip install geopandas shapely fiona || echo "geopandas インストール失敗（GeoJSON 変換はスキップ）"

      # 各ジョブの成果物をダウンロード (一部失敗OK)
      - name: Download enriched chuko core
        uses: actions/download-artifact@v4
        with:
          name: enriched-chuko-core
          path: scraping-tool/enriched-chuko-core/
        continue-on-error: true

      # enriched-chuko-sumai は独立ワークフローに移動（Supabase 直接書き込み）

      - name: Download enriched chuko mansion
        uses: actions/download-artifact@v4
        with:
          name: enriched-chuko-mansion
          path: scraping-tool/enriched-chuko-mansion/
        continue-on-error: true

      - name: Download enriched chuko claude
        uses: actions/download-artifact@v4
        with:
          name: enriched-chuko-claude
          path: scraping-tool/enriched-chuko-claude/
        continue-on-error: true

      - name: Download enriched shinchiku
        uses: actions/download-artifact@v4
        with:
          name: enriched-shinchiku
          path: scraping-tool/enriched-shinchiku/
        continue-on-error: true

      - name: Download transactions
        uses: actions/download-artifact@v4
        with:
          name: transactions
          path: scraping-tool/transactions/
        continue-on-error: true

      - name: Download previous data
        uses: actions/download-artifact@v4
        with:
          name: scrape-previous
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/results/
        continue-on-error: true

      - name: Download cache files
        uses: actions/download-artifact@v4
        with:
          name: scrape-caches
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/data/
        continue-on-error: true

      - name: Download scrape results (for raw base)
        uses: actions/download-artifact@v4
        with:
          name: scrape-results
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scraping-tool/scrape-results/
        continue-on-error: true

      - name: Restore Claude response cache (finalize)
        uses: actions/cache/restore@v4
        with:
          path: scraping-tool/data/claude_cache.db
          key: claude-cache-finalize-${{ github.run_id }}
          restore-keys: |
            claude-cache-finalize-

      - name: Prepopulate Claude cache from Supabase
        working-directory: scraping-tool
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/prepopulate_cache.py

      - name: Run finalize
        working-directory: scraping-tool
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_SUPABASE_EXPORT: "1"
        run: |
          chmod +x scripts/run_finalize.sh
          ./scripts/run_finalize.sh \
            --is-slack-time "${{ needs.check.outputs.is_slack_time }}" \
            --has-changes "${{ needs.check.outputs.has_changes }}" \
            --date "${{ needs.check.outputs.date }}" \
            --skip-maps true

      - name: Build map viewer
        if: needs.check.outputs.has_changes == 'true'
        working-directory: scraping-tool
        timeout-minutes: 15
        continue-on-error: true
        run: |
          SHINCHIKU_FLAG=""
          if [ -s results/latest_shinchiku.json ]; then
            SHINCHIKU_FLAG="--shinchiku results/latest_shinchiku.json"
          fi
          echo "--- 地図生成 ---" >&2
          python3 scripts/build_map_viewer.py results/latest.json $SHINCHIKU_FLAG
          echo "--- geocode キャッシュクリーンアップ ---" >&2
          python3 scripts/geocode.py || true
          if [ ! -f results/risk_geojson/building_collapse_risk.geojson ]; then
            python3 scripts/convert_risk_geojson.py 2>&1 || true
          fi

      - name: Save Claude response cache (finalize)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scraping-tool/data/claude_cache.db
          key: claude-cache-finalize-${{ github.run_id }}

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          DATE="${{ needs.check.outputs.date }}"
          COUNT=$(jq length scraping-tool/results/latest.json 2>/dev/null || echo 0)

          echo "--- cache debug ---"
          echo "geocode_cache entries: $(python3 -c 'import json; print(len(json.load(open("scraping-tool/data/geocode_cache.json"))))' 2>/dev/null || echo 'N/A')"
          echo "git status data/:"
          git status scraping-tool/data/ 2>&1 | head -10
          echo "---"

          git add scraping-tool/results/
          for f in \
            scraping-tool/data/building_units.json \
            scraping-tool/data/geocode_cache.json \
            scraping-tool/data/sumai_surfin_cache.json \
            scraping-tool/data/reinfolib_prices.json \
            scraping-tool/data/reinfolib_trends.json \
            scraping-tool/data/reinfolib_land_prices.json \
            scraping-tool/data/estat_population.json \
            scraping-tool/data/floor_plan_storage_manifest.json \
            scraping-tool/data/station_cache.json \
            scraping-tool/data/reverse_geocode_cache.json \
            scraping-tool/data/first_seen_at.json \
            scraping-tool/data/listings.db \
            scraping-tool/data/mansion_review_cache.json \
            scraping-tool/data/claude_cache.db; do
            [ -f "$f" ] && git add "$f"
          done
          [ -d scraping-tool/results/risk_geojson ] && git add scraping-tool/results/risk_geojson/

          if git diff --cached --quiet; then
            echo "コミットする変更がありません"
            exit 0
          fi

          git commit -m "Update listings: ${DATE}

          取得件数: ${COUNT}件
          レポート: scraping-tool/results/report/report.md
          自動更新: GitHub Actions (enrich-and-report)" || exit 0

          git stash --quiet 2>/dev/null || true

          if git pull --rebase -X theirs origin ${{ github.ref_name }}; then
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          else
            echo "rebase 失敗: merge 方式にフォールバック" >&2
            git rebase --abort 2>/dev/null || true
            git pull --no-rebase -X ours origin ${{ github.ref_name }}
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          fi

          # stash に残ったキャッシュ更新をコミット（Build map viewer 等の追加分）
          if git stash pop --quiet 2>/dev/null; then
            for f in scraping-tool/data/geocode_cache.json scraping-tool/data/reverse_geocode_cache.json; do
              [ -f "$f" ] && git add "$f"
            done
            if ! git diff --cached --quiet; then
              git commit -m "chore: update geocode cache"
              git push origin HEAD:refs/heads/${{ github.ref_name }}
            fi
          fi

      - name: Notify failure to Slack
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\": \":rotating_light: *Enrich & Report 失敗*\nワークフロー: ${{ github.workflow }}\n実行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
