name: Scrape Listings

# WF1: スクレイピング専用ワークフロー
# 中古物件を取得し、artifact 経由で WF2 (Enrich & Report) にデータを渡す。
# 20-40分で完了するため、2時間スケジュールでキャンセルされない。

on:
  schedule:
    # 1日4回実行: JST 9:00, 15:00, 18:00, 20:00（UTC 0:00, 6:00, 9:00, 11:00）
    # UTC 0:00 (JST 9:00) の回で Slack 通知を送信（GHA遅延許容: UTC 0-5）
    #
    # 夜間便を UTC 13(JST22) → UTC 11(JST20) に前倒し。
    # GHA cron は実測 4〜5h 遅延するため、UTC13 起動だと実際の enrich 完了が JST 3:49 頃となり
    # Desktop の routine①(データ準備, JST 3:00)に間に合わず、その日の新着が当日採点・朝ダイジェストに
    # 乗らなかった。UTC11 起動なら 5h 遅延でも JST 2 時台に enrich 完了し routine① 前に入る
    # （hazard 永続キャッシュ導入で enrich が数分に短縮済みなのが前提。PR #72）。
    # 稀に 6h 超遅延した日は当日分が翌サイクルに繰り越る（フェイルソフト）。
    - cron: '0 0,6,9,11 * * *'
  workflow_dispatch:
    inputs:
      send_slack:
        description: 'Slack通知を送信する（デフォルト: true）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: scrape-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraping-tool/requirements.txt

      - name: Install dependencies
        working-directory: scraping-tool
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        working-directory: scraping-tool
        run: |
          python3 -c "import playwright" 2>/dev/null && playwright install chromium --with-deps || echo "playwright インストールスキップ"

      # geocode キャッシュは PII 混入の恐れで .gitignore 化し、git commit から
      # actions/cache（repo スコープ）へ永続化を移行した。restore-keys の prefix で
      # 直近のキャッシュ（scrape / finalize いずれかの最新）を取得してウォームスタートする。
      - name: Restore geocode caches
        uses: actions/cache/restore@v4
        with:
          path: |
            scraping-tool/data/geocode_cache.json
            scraping-tool/data/reverse_geocode_cache.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: |
            geocode-cache-

      - name: Run scraping
        id: scrape
        working-directory: scraping-tool
        run: |
          chmod +x scripts/run_scrape.sh
          ./scripts/run_scrape.sh

      # スクレイプ中に hazard/neighborhood enricher が追記した geocode 結果を永続化。
      - name: Save geocode caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            scraping-tool/data/geocode_cache.json
            scraping-tool/data/reverse_geocode_cache.json
          key: geocode-cache-${{ github.run_id }}

      - name: Read metadata
        id: metadata
        working-directory: scraping-tool
        run: |
          if [ -f results/metadata.json ]; then
            HAS_CHANGES=$(python3 -c "import json; print(str(json.load(open('results/metadata.json'))['has_changes']).lower())")
            IS_SLACK_TIME=$(python3 -c "import json; print(str(json.load(open('results/metadata.json'))['is_slack_time']).lower())")
            # 手動実行時の Slack 制御
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.send_slack }}" != "false" ]; then
              IS_SLACK_TIME=true
            fi
            echo "has_changes=${HAS_CHANGES}" >> $GITHUB_OUTPUT
            echo "is_slack_time=${IS_SLACK_TIME}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "is_slack_time=false" >> $GITHUB_OUTPUT
          fi

      # スクレイピング結果を artifact としてアップロード
      # force enrich でも利用できるよう常にアップロードする
      - name: Upload scrape results
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: scraping-tool/results/latest_raw.json
          retention-days: 1
          if-no-files-found: error

      # 前回データ (レポート差分用) + スクレイパー健全性メトリクス
      # (finalize ジョブが results/ に展開し、slack_notify がアラート判定に使う)
      - name: Upload previous data
        uses: actions/upload-artifact@v4
        with:
          name: scrape-previous
          path: |
            scraping-tool/results/latest.json
            scraping-tool/results/scraper_metrics.json
          retention-days: 1
          if-no-files-found: warn

      # メタデータ
      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: scrape-metadata
          path: scraping-tool/results/metadata.json
          retention-days: 1

      # キャッシュファイル群 (enrichment で必要)
      - name: Upload cache files
        uses: actions/upload-artifact@v4
        with:
          name: scrape-caches
          path: |
            scraping-tool/data/geocode_cache.json
            scraping-tool/data/sumai_surfin_cache.json
            scraping-tool/data/building_units.json
            scraping-tool/data/floor_plan_storage_manifest.json
            scraping-tool/data/reinfolib_prices.json
            scraping-tool/data/reinfolib_trends.json
            scraping-tool/data/reinfolib_raw_transactions.json
            scraping-tool/data/reinfolib_land_prices.json
            scraping-tool/data/station_price_history.json
            scraping-tool/data/estat_population.json
            scraping-tool/data/station_cache.json
            scraping-tool/data/reverse_geocode_cache.json
            scraping-tool/data/shutoken_city_codes.json
            scraping-tool/data/first_seen_at.json
            scraping-tool/data/listings.db
          retention-days: 1
          if-no-files-found: warn

      - name: Notify failure to Slack
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\": \":rotating_light: *Scrape Listings 失敗*\nワークフロー: ${{ github.workflow }}\n実行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
