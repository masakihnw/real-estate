name: Backfill HOME'S Images

# HOME'S 詳細ページの取得・パースの正は scraping-tool/floor_plan_enricher.py
# （HomesDetailFetcher / parse_homes_*）。このワークフローはそれを呼ぶだけにする
# （以前はインラインPythonでパーサを再実装しており、三重管理になっていた）。

on:
  schedule:
    - cron: '30 19 * * *'  # 毎日 JST 4:30（UTC 19:30）
  workflow_run:
    workflows: ["Enrich and Report"]
    types: [completed]
  workflow_dispatch:
    inputs:
      limit:
        description: '処理上限件数（0=全件）'
        required: false
        default: '0'
        type: string
      delay:
        description: 'リクエスト間隔（秒）'
        required: false
        default: '8'
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scraping-tool

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      # 詳細ページHTMLキャッシュをラン間で共有（同一ページの再取得を防ぐ。
      # 特に「画像なし」と判定されたページを毎日叩き直さないため）
      - name: Cache HOME'S detail HTML
        uses: actions/cache@v4
        with:
          path: scraping-tool/data/homes_html_cache
          key: homes-html-cache-${{ github.run_id }}
          restore-keys: |
            homes-html-cache-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKFILL_LIMIT: ${{ inputs.limit || (github.event_name == 'workflow_run' && '20') || '50' }}
          BACKFILL_DELAY: ${{ inputs.delay || '10' }}
        run: |
          python3 homes_image_backfill.py --limit "$BACKFILL_LIMIT" --delay "$BACKFILL_DELAY"
