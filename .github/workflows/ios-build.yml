name: iOS Build Verification

on:
  pull_request:
    paths:
      - 'real-estate-ios/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Generate Xcode Project
        working-directory: real-estate-ios
        run: xcodegen generate

      - name: Resolve Package Dependencies
        working-directory: real-estate-ios
        run: xcodebuild -resolvePackageDependencies -project RealEstateApp.xcodeproj -scheme RealEstateApp

      # NOTE: 以前は `| xcpretty || true` でビルド失敗が CI 上は常に成功扱いになっていた。
      # pipefail + || true 削除で失敗を正しく検知する。
      # Mac Catalyst ビルドは Mac 版廃止（2026-05-16）に伴い削除済み。
      - name: Build & Test (iOS)
        working-directory: real-estate-ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project RealEstateApp.xcodeproj \
            -scheme RealEstateApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
