name: Storage Image GC

# listing-images の不要画像（孤児・掲載終了物件の画像）を定期削除する。
# あわせてマニフェスト剪定と enrichments の参照スクラブを行い、
# 変更されたマニフェストをコミットする。
# フェイルセーフ（削除比率上限・直近作成の保護・フェイルクローズ）は
# scripts/storage_image_gc.py 側に実装されている。

on:
  schedule:
    - cron: '0 19 * * 0'  # 月曜 4:00 JST（スクレイピングと重ならない時間帯）
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run（削除せずに対象件数のみ表示）'
        type: boolean
        default: false
      backend:
        description: '対象バックエンド（auto: R2設定済みならR2。R2移行完了前のSupabase掃除には supabase を指定）'
        type: choice
        options:
          - auto
          - supabase
          - r2
        default: auto

concurrency:
  group: storage-image-gc
  cancel-in-progress: false

jobs:
  gc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraping-tool/requirements.txt

      - name: Install dependencies
        working-directory: scraping-tool
        run: pip install -r requirements.txt

      - name: Run storage image GC
        working-directory: scraping-tool
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          ARGS=""
          BACKEND="${{ github.event.inputs.backend }}"
          if [ -n "$BACKEND" ] && [ "$BACKEND" != "auto" ]; then
            ARGS="--backend $BACKEND"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 scripts/storage_image_gc.py $ARGS
          else
            python3 scripts/storage_image_gc.py $ARGS --execute
          fi

      - name: Commit pruned manifest
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add scraping-tool/data/floor_plan_storage_manifest.json

          if git diff --cached --quiet; then
            echo "マニフェスト変更なし"
            exit 0
          fi

          git commit -m "chore: storage GC によるマニフェスト剪定

          storage-image-gc workflow"

          git pull --rebase --autostash origin main
          git push origin HEAD:refs/heads/main
